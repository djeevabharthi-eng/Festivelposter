<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sunchaser Festival Poster</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bowlby+One+SC&family=Caveat:wght@600;700&family=Archivo:wght@500;600;700;800&display=swap');

  :root{
    --cream:#F4E4C8;
    --cream-soft:#EDDCBE;
    --teal-deep:#1F4D49;
    --teal:#2A6A63;
    --rust:#8B2E22;
    --ink:#2B1810;
    --coral:#E8957A;
    --sun-core:#FCE08A;
    --sun-mid:#F2A23B;
    --sun-edge:#E0652A;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  body{
    background:#0c0c0c;
    display:flex;
    justify-content:center;
    padding:40px 10px;
    font-family:'Archivo',sans-serif;
  }

  .poster{
    width:1000px;
    background:var(--cream);
    position:relative;
    overflow:hidden;
    border:14px solid var(--ink);
    box-shadow:
      inset 0 0 0 8px var(--cream),
      inset 0 0 0 11px var(--rust),
      0 30px 80px rgba(0,0,0,0.55);
  }

  .eyebrow{
    background:var(--teal-deep);
    color:var(--cream);
    text-align:center;
    padding:18px 0;
    font-weight:700;
    letter-spacing:6px;
    font-size:19px;
    text-transform:uppercase;
  }

  .tagline-wrap{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:22px;
    padding:30px 0 22px;
  }

  .tagline{
    font-family:'Caveat',cursive;
    font-weight:700;
    font-size:56px;
    color:var(--rust);
  }

  .lineup{
    padding:6px 64px 10px;
  }

  .lineup-title{
    font-family:'Bowlby One SC',cursive;
    font-size:28px;
    letter-spacing:12px;
    text-align:center;
    margin-bottom:30px;
  }

  .day-row{
    display:flex;
    gap:30px;
    padding:24px 0;
    border-bottom:3px dashed var(--rust);
  }

  .day-badge{
    width:94px;
    height:94px;
    border-radius:50%;
    background:var(--teal-deep);
    color:var(--cream);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Bowlby One SC',cursive;
    font-size:18px;
  }

  .headliner{
    font-family:'Bowlby One SC',cursive;
    font-size:34px;
    color:var(--rust);
  }

  .supporting{
    font-size:14px;
    text-transform:uppercase;
    opacity:0.8;
  }

  .footer{
    background:var(--teal-deep);
    color:var(--cream);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:26px 70px;
  }

  .get-tickets-btn{
    background:linear-gradient(135deg, var(--sun-core), var(--sun-edge));
    color:var(--ink);
    font-family:'Bowlby One SC',cursive;
    padding:16px 32px;
    border-radius:10px;
    text-decoration:none;
    box-shadow:0 5px 0 var(--rust);
  }

</style>
</head>

<body>

<div class="poster">

  <!-- VENUE UPDATED -->
  <div class="eyebrow">
    AUG 14–16, 2026 <span>◆</span> CHENNAI, TAMIL NADU
  </div>

  <!-- TAGLINE -->
  <div class="tagline-wrap">
    <div class="tagline">music, dust & golden light</div>
  </div>

  <!-- LINEUP UPDATED -->
  <div class="lineup">

    <div class="lineup-title">THE LINEUP</div>

    <div class="day-row">
      <div class="day-badge">SONG</div>
      <div>
        <div class="headliner">SUNDARI KANNAL</div>
        <div class="supporting">ILAIYARAAJA</div>
      </div>
    </div>

    <div class="day-row">
      <div class="day-badge">SONG</div>
      <div>
        <div class="headliner">KANNE KALAIMANE</div>
        <div class="supporting">K. J. YESUDAS</div>
      </div>
    </div>

    <div class="day-row">
      <div class="day-badge">SONG</div>
      <div>
        <div class="headliner">ENNA SOLLA POGIRAI</div>
        <div class="supporting">SHANKAR MAHADEVAN</div>
      </div>
    </div>

  </div>

  <!-- FOOTER -->
  <div class="footer">

    <div>
      Tickets from ₹89<br>
      <small>Camping included · All ages</small>
    </div>

    <a class="get-tickets-btn" href="https://sunchaserfest.com/tickets" target="_blank">
      🎟 GET TICKETS →
    </a>

  </div>

</div>

</body>
</html>
